<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — The Four Extractions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 500px; height: 400px; overflow: hidden; background: #000; }

  .base-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.72) saturate(0.85);
  }

  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,10,0.12) 0%,
      rgba(0,0,10,0.06) 30%,
      rgba(0,0,10,0.58) 65%,
      rgba(0,0,10,0.90) 100%
    );
  }

  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute; width: 28px; height: 28px;
  }
  .corner-tl { top: 10px; left: 10px; border-top: 1px solid rgba(100,160,255,0.5); border-left: 1px solid rgba(100,160,255,0.5); }
  .corner-tr { top: 10px; right: 10px; border-top: 1px solid rgba(100,160,255,0.5); border-right: 1px solid rgba(100,160,255,0.5); }
  .corner-bl { bottom: 10px; left: 10px; border-bottom: 1px solid rgba(100,160,255,0.5); border-left: 1px solid rgba(100,160,255,0.5); }
  .corner-br { bottom: 10px; right: 10px; border-bottom: 1px solid rgba(100,160,255,0.5); border-right: 1px solid rgba(100,160,255,0.5); }

  .rule-top { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(100,180,255,0.6), transparent); }
  .rule-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, rgba(100,180,255,0.4), transparent); }

  .numerals {
    position: absolute; top: 18px; right: 18px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 7px;
  }
  .numeral {
    font-family: 'Cinzel', serif; font-size: 10px;
    font-weight: 700; letter-spacing: 0.15em; opacity: 0.88;
  }

  .bottom-block {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 16px 18px 20px;
  }
  .title {
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900;
    letter-spacing: 0.08em; color: #e8dcc0; line-height: 1.2;
    margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,0,0,0.9);
  }
  .sub {
    font-family: 'Share Tech Mono', monospace; font-size: 8px;
    letter-spacing: 0.28em; color: rgba(160,200,255,0.7);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, rgba(100,160,255,0.4), transparent);
    margin-bottom: 9px;
  }
  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag {
    font-family: 'Share Tech Mono', monospace; font-size: 7px;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 2px 7px; border: 1px solid; opacity: 0.82;
  }

  .attr {
    position: absolute; bottom: 14px; right: 18px;
    font-family: 'Share Tech Mono', monospace; font-size: 6px;
    letter-spacing: 0.25em; color: rgba(100,140,255,0.35);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<img class="base-img" src="ballistic_preview.png" alt="">
<div class="overlay"></div>
<div class="rule-top"></div>
<div class="rule-bottom"></div>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="corner-bl"></div>
<div class="corner-br"></div>

<div class="numerals">
  <span class="numeral" style="color:#f4a340;">I · MATHEMATICS</span>
  <span class="numeral" style="color:#e05555;">II · GENETICS</span>
  <span class="numeral" style="color:#4caf7d;">III · BOTANICAL</span>
  <span class="numeral" style="color:#7b8cde;">IV · TEMPORAL</span>
</div>

<div class="bottom-block">
  <div class="title">The Four Extractions</div>
  <div class="sub">Ballistic Plot · Africa as Origin Platform</div>
  <div class="divider"></div>
  <div class="tag-row">
    <span class="tag" style="color:#f4a340;border-color:rgba(244,163,64,0.4)">Ishango · 20,000 BCE</span>
    <span class="tag" style="color:#4caf7d;border-color:rgba(76,175,125,0.4)">Hoodia · Teff · Brazzeine</span>
    <span class="tag" style="color:#7b8cde;border-color:rgba(123,140,222,0.4)">Brussels · Still There</span>
  </div>
</div>

<div class="attr">SOVRA-FCL-MHCE-v2.5© · O_f = 0</div>

</body>
</html>
