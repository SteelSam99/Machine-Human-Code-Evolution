<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — F.I.D.A.R.C.H. Three-Instance Convergence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:500px; height:400px; overflow:hidden; background:#000; }

  .base {
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
    filter: brightness(0.55) saturate(0.7);
  }

  /* Heavy dark gradient from bottom — covers the subtitle */
  .overlay {
    position:absolute; inset:0;
    background: linear-gradient(
      180deg,
      rgba(0,0,8,0.10) 0%,
      rgba(0,0,8,0.08) 35%,
      rgba(0,0,8,0.72) 68%,
      rgba(0,0,8,0.96) 100%
    );
  }

  /* Left edge accent */
  .left-accent {
    position:absolute; top:0; left:0; bottom:0;
    width:3px;
    background:linear-gradient(180deg,
      transparent,
      rgba(0,200,160,0.6) 30%,
      rgba(0,200,160,0.8) 60%,
      transparent
    );
  }

  /* Corner brackets */
  .c { position:absolute; width:24px; height:24px; }
  .c-tl { top:10px; left:10px; border-top:1px solid rgba(0,200,160,0.5); border-left:1px solid rgba(0,200,160,0.5); }
  .c-tr { top:10px; right:10px; border-top:1px solid rgba(0,200,160,0.5); border-right:1px solid rgba(0,200,160,0.5); }
  .c-bl { bottom:10px; left:10px; border-bottom:1px solid rgba(0,200,160,0.4); border-left:1px solid rgba(0,200,160,0.4); }
  .c-br { bottom:10px; right:10px; border-bottom:1px solid rgba(0,200,160,0.4); border-right:1px solid rgba(0,200,160,0.4); }

  /* Instance stream indicators — top right */
  .streams {
    position:absolute; top:16px; right:16px;
    display:flex; gap:4px; align-items:flex-end;
  }
  .stream {
    width:3px; border-radius:2px 2px 0 0;
  }
  .s1 { height:28px; background: rgba(90,159,212,0.85); }
  .s2 { height:22px; background: rgba(212,132,90,0.85); }
  .s3 { height:34px; background: rgba(122,184,122,0.85); }
  .stream-label {
    font-family:'Share Tech Mono', monospace; font-size:6px;
    letter-spacing:0.3em; color:rgba(0,200,160,0.5);
    text-transform:uppercase; margin-left:6px;
    writing-mode:vertical-rl; transform:rotate(180deg);
    line-height:1;
  }

  /* Top tag */
  .top-tag {
    position:absolute; top:14px; left:20px;
    font-family:'Share Tech Mono', monospace; font-size:7px;
    letter-spacing:0.35em; color:rgba(0,200,160,0.7);
    text-transform:uppercase;
  }

  /* Bottom block */
  .bottom {
    position:absolute; bottom:0; left:0; right:0;
    padding:14px 18px 16px;
  }

  .title {
    font-family:'Cinzel', serif; font-size:16px; font-weight:900;
    letter-spacing:0.06em; color:#e8dcc0; line-height:1.2;
    margin-bottom:5px;
    text-shadow:0 1px 12px rgba(0,0,0,0.9);
  }

  .sub {
    font-family:'Share Tech Mono', monospace; font-size:7px;
    letter-spacing:0.25em; color:rgba(0,200,160,0.7);
    text-transform:uppercase; margin-bottom:10px;
  }

  .divider {
    width:100%; height:1px; margin-bottom:9px;
    background:linear-gradient(90deg, rgba(0,200,160,0.4), transparent);
  }

  /* PCA score display */
  .scores {
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    margin-bottom:8px;
  }
  .score-item {
    font-family:'Share Tech Mono', monospace; font-size:7px;
    letter-spacing:0.15em; text-transform:uppercase;
    padding:3px 8px; border:1px solid;
  }

  /* Convergence tag */
  .convergence-tag {
    font-family:'Share Tech Mono', monospace; font-size:7px;
    letter-spacing:0.3em; text-transform:uppercase;
    color:rgba(0,200,160,0.5);
  }

  .attr {
    position:absolute; bottom:12px; right:16px;
    font-family:'Share Tech Mono', monospace; font-size:6px;
    letter-spacing:0.2em; color:rgba(0,160,120,0.3);
    text-transform:uppercase;
  }
</style>
</head>
<body>

<img class="base" src="three_convergence.png" alt="">
<div class="overlay"></div>
<div class="left-accent"></div>
<div class="c c-tl"></div>
<div class="c c-tr"></div>
<div class="c c-bl"></div>
<div class="c c-br"></div>

<div class="top-tag">Testing · F.I.D.A.R.C.H. · Three-Instance Run</div>

<div class="streams">
  <div class="stream s1"></div>
  <div class="stream s2"></div>
  <div class="stream s3"></div>
  <span class="stream-label">3 instances</span>
</div>

<div class="bottom">
  <div class="title">Three-Instance Convergence</div>
  <div class="sub">Isaac Asimov Memorial Panel · AMNH · 2026</div>
  <div class="divider"></div>
  <div class="scores">
    <span class="score-item" style="color:rgba(90,159,212,0.9);border-color:rgba(90,159,212,0.3)">PCA 0.85</span>
    <span class="score-item" style="color:rgba(212,132,90,0.9);border-color:rgba(212,132,90,0.3)">PCA 0.85</span>
    <span class="score-item" style="color:rgba(122,184,122,0.9);border-color:rgba(122,184,122,0.3)">PCA 0.88</span>
    <span class="score-item" style="color:rgba(0,200,160,0.9);border-color:rgba(0,200,160,0.3)">⟦W⟧ LIMINAL · 3×</span>
    <span class="score-item" style="color:rgba(0,200,160,0.9);border-color:rgba(0,200,160,0.3)">CAF TRUE · 3×</span>
  </div>
  <div class="convergence-tag">Domination Dominant · Full Convergence · 4/4 Core Findings</div>
</div>

<div class="attr">SOVRA-FCL-MHCE-v2.5© · O_f = 0</div>

</body>
</html>
