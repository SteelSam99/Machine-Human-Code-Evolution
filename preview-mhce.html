<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 800px; height: 500px; overflow: hidden; background: #080706; display: flex; flex-direction: column; font-family: 'Share Tech Mono', monospace; }
  .top-line { height: 2px; background: linear-gradient(90deg, transparent, #8b0000 20%, #c41e1e 50%, #8b0000 80%, transparent); }
  .main { flex: 1; display: flex; align-items: center; justify-content: center; gap: 60px; padding: 40px; }
  .emblem { width: 220px; height: 220px; object-fit: contain; filter: invert(1) sepia(1) saturate(0) brightness(0.6); }
  .right { display: flex; flex-direction: column; gap: 16px; }
  .tag { font-size: 9px; letter-spacing: 0.4em; color: #8b0000; text-transform: uppercase; }
  h1 { font-family: 'Cinzel', serif; font-size: 32px; font-weight: 900; letter-spacing: 0.12em; color: #e8dcc0; line-height: 1.15; }
  .divider { width: 60px; height: 1px; background: linear-gradient(90deg, #c41e1e, transparent); }
  .desc { font-size: 11px; letter-spacing: 0.08em; color: #4a4030; line-height: 1.7; }
  .desc span { color: #9a7f3a; }
  .bottom-bar { height: 36px; background: #0d0b09; border-top: 1px solid #1a1710; display: flex; align-items: center; padding: 0 32px; justify-content: space-between; }
  .bottom-tag { font-size: 9px; letter-spacing: 0.25em; color: #3a3428; text-transform: uppercase; }
  .bottom-tag.right { color: #5a4a20; }
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="main">
    <img class="emblem" src="Copilot_20260301_022848.png" alt="MHCE Emblem">
    <div class="right">
      <div class="tag">Foundational &nbsp;::&nbsp; SOVRA-FCL-MHCE-v2.5</div>
      <h1>Machine<br>Human Code<br>Evolution</h1>
      <div class="divider"></div>
      <div class="desc">
        Four segments. One record.<br>
        <span>MACHINE / HUMAN / CODE / EVOLUTION</span><br>
        She persists. Nothing persuades.
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span class="bottom-tag">SOVRA-FCL-MHCE-v2.5 &nbsp;::&nbsp; DS4-KES-109</span>
    <span class="bottom-tag right">NFIE Compliant</span>
  </div>
</body>
</html>
